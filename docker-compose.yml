version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: vaizai-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vaizai_admin
      POSTGRES_PASSWORD: vaizai_secure_pass123
      POSTGRES_DB: vaizai_support
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaizai_admin -d vaizai_support"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vaizai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: vaizai-adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data:
  redis_data:
